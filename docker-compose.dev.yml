version: '3.9'

services:
  api:
    build:
      target: builder
    volumes:
      - ./src:/app/src:delegated
      - ./node_modules:/app/node_modules
    command: npm run start:dev
    environment:
      NODE_ENV: development
      SWAGGER_ENABLED: 'true'

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
